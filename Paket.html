<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karokue-Produk</title>
    <link rel="icon" href="faveicon" type="image/x-icon">
    <link rel="stylesheet" href="Style/index.css">
    <link rel="stylesheet" href="Style/Responsive.css">
</head>

<body>
    <header class="headerNav">
        <div class="navLogo">
            <img src="Assets/Logo/logo.png" alt="Karokue Logo">
        </div>
        <nav class="navBar">
            <ul class="navBarUl">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="Produk.html">Produk</a></li>
                <li><a href="Paket.html">Paket</a></li>
            </ul>
        </nav>
    </header>

    <main class="mainContent">
        <!-- Recommendation Section -->
        <div class="CardContainer">
            <div class="CardNav">
                <div>Paket MIX </div>
            </div>
            <div class="card">
                <div class="cardFrame" onclick="openModal('/Assets/Produk/1.png')">
                    <a href="#">
                        <div class="cardContent">
                            <div class="imageProduct">
                                <img src="\Assets\Produk\1.png" alt="Nastar">
                                <span class="wordContent">Nastar</span>
                            </div>
                            <div class="contentProduct">
                                <ul class="pricePromo">
                                    <li class="price">Rp 40.000,-</li>
                                    <li class="promo">Rp 40.000,-</li>
                                </ul>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="cardFrame" onclick="openModal('/Assets/Produk/5.png')">
                    <a href="#">
                        <div class="cardContent">
                            <div class="imageProduct">
                                <img src="\Assets\Produk\5.png" alt="Cookies Kacang">
                                <span class="wordContent">Cookies Kacang </span>
                            </div>
                            <div class="contentProduct">
                                <ul class="pricePromo">
                                    <li class="price">Rp 40.000,-</li>
                                    <li class="promo">Rp 40.000,-</li>
                                </ul>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Aside Section -->
                <aside class="orderHere">
                    <div class="orderContainer">
                        <div class="orderWord">
                            <a href="https://wa.me/6281772840052?" target="_blank">
                                <ul class="order">
                                    <li>O</li>
                                    <li>R</li>
                                    <li>D</li>
                                    <li>E</li>
                                    <li>R</li>
                                </ul>
                                <ul class="here">
                                    <li>D</li>
                                    <li class="i">I</li>
                                    <li>S</li>
                                    <li class="i">I</li>
                                    <li>N</li>
                                    <li class="i">I</li>
                                </ul>
                            </a>
                        </div>
                    </div>
                </aside>
                <!-- Aside Section -->

                <!-- Modal Section -->
                <div id="myModal" class="modal">
                    <span class="close" onclick="closeModal()">&times;</span>
                    <img class="modal-content" id="modalImg">
                </div>
                <!-- Modal Section -->
    </main>

    <!-- Footer Section -->
    <footer class="footerNav">
        <div class="copyright">
            <div class="copyrightWord">
                <p>Hak Cipta &copy; 2023 Karokue. Hak Cipta Dilindungi.</p>
            </div>
            <div class="Socmed">
                <div class="socmedWord">
                    <p>Check Our Sosial Media :</p>
                </div>
                <div class="socmedIcon">
                    <div class="icon">
                        <a href="https://www.instagram.com/karokue_" target="_blank">
                            <img src="Assets\Icon\instagram.png" alt="Instagram">
                        </a>
                    </div>
                    <div class="icon">
                        <a href="https://www.tiktok.com/@karokue" target="_blank">
                            <img src="Assets\Icon\tiktok.png" alt="Tiktok">
                        </a>
                    </div>
                    <div class="icon">
                        <a href="https://wa.me/6281772840052?" target="_blank">
                            <img src="Assets\Icon\whatsapp.png" alt="Whatsapp">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <!-- Footer Section -->

    <!-- Function -->
    <script src="Function\Carousel.js"></script>
    <script src="Function\Popup.js"></script>
    <!-- Function -->
</body>

</html>
